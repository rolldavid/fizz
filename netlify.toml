# Netlify builds ONLY the web app (web/): the /bridge + /launch tool pages plus
# the static landing home. It does NOT build the browser extension.
#
# `base = "web"` keeps Netlify off the repo-root build (which builds the
# extension and would fail/timeout here) and installs only web/ deps (web has
# its own yarn.lock). `yarn build` runs tsc + vite, then deploy-to-landing.mjs
# writes the built tool pages into ../landing next to the committed static home
# (index.html, _headers, images). That combined dir is what we publish.
#
# Set VITE_WALLETCONNECT_PROJECT_ID in the Netlify UI
# (Site settings -> Environment variables); it is read at build time.
[build]
  base    = "web"
  command = "yarn build"
  publish = "../landing"
